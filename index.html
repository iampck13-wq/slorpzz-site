<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Slorpzz</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Raleway:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #080800;
      --border: #2a2200;
      --gold: #c9a84c;
      --gold-light: #f0d080;
      --gold-dim: #6b5520;
      --text: #f5e9c8;
      --muted: #6b5c3a;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #05050a;
      color: var(--text);
      font-family: 'Raleway', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* ── Canvas background ── */
    #bg-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    /* ── Flash overlay ── */
    #flash {
      position: fixed;
      inset: 0;
      background: rgba(200, 220, 255, 0);
      z-index: 1;
      pointer-events: none;
      transition: background 0.05s;
    }

    .container {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 500px;
      padding: 3rem 1.5rem 4rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
    }

    .header { text-align: center; animation: fadeDown 0.9s cubic-bezier(.22,1,.36,1) both; }

    .crown {
      font-size: 2rem; line-height: 1; margin-bottom: 0.4rem;
      filter: drop-shadow(0 0 12px rgba(201,168,76,0.9));
      animation: floatCrown 3s ease-in-out infinite;
      display: block;
    }
    @keyframes floatCrown {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    .name {
      font-family: 'Cinzel', serif;
      font-size: clamp(3rem, 12vw, 5rem);
      font-weight: 900;
      letter-spacing: 0.08em;
      background: linear-gradient(135deg, #6b5520 0%, #c9a84c 35%, #f0d080 55%, #c9a84c 75%, #6b5520 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 30px rgba(201,168,76,0.5));
      line-height: 1;
    }

    .divider { width: 100%; display: flex; align-items: center; gap: 1rem; margin-top: 1rem; }
    .divider-line { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }
    .divider-diamond { width: 8px; height: 8px; background: var(--gold); transform: rotate(45deg); box-shadow: 0 0 10px var(--gold); }

    .cards { width: 100%; display: flex; flex-direction: column; gap: 0.85rem; }

    .card {
      display: flex; align-items: center; gap: 1rem;
      padding: 1rem 1.3rem;
      background: linear-gradient(135deg, rgba(10,10,5,0.85), rgba(15,12,0,0.9));
      backdrop-filter: blur(6px);
      border: 1px solid var(--border);
      border-radius: 4px;
      text-decoration: none; color: var(--text);
      position: relative; overflow: hidden;
      transition: border-color 0.3s, transform 0.2s;
      animation: fadeUp 0.6s cubic-bezier(.22,1,.36,1) both;
    }
    .card:nth-child(1){animation-delay:0.25s}
    .card:nth-child(2){animation-delay:0.35s}
    .card:nth-child(3){animation-delay:0.45s}
    .card:nth-child(4){animation-delay:0.55s}
    .card:nth-child(5){animation-delay:0.65s}
    .card:nth-child(6){animation-delay:0.75s}
    .card:nth-child(7){animation-delay:0.85s}

    .card::before {
      content: ''; position: absolute; left:0; top:0; width:3px; height:100%;
      background: linear-gradient(180deg, var(--gold-light), var(--gold), var(--gold-dim));
      opacity: 0; transition: opacity 0.3s;
    }
    .card::after {
      content: ''; position: absolute; inset:0;
      background: linear-gradient(90deg, rgba(201,168,76,0.06), transparent);
      opacity: 0; transition: opacity 0.3s;
    }
    .card:hover { border-color: var(--gold-dim); transform: translateX(4px); }
    .card:hover::before, .card:hover::after { opacity: 1; }
    .card-static { cursor: default; }
    .card-clickable { cursor: pointer; }

    .card-icon {
      width: 44px; height: 44px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      background: rgba(201,168,76,0.08);
      border: 1px solid rgba(201,168,76,0.2);
      flex-shrink: 0; position: relative; z-index: 1;
      transition: background 0.3s, box-shadow 0.3s;
    }
    .card-icon svg { width: 24px; height: 24px; display: block; }
    .card:hover .card-icon { background: rgba(201,168,76,0.15); box-shadow: 0 0 16px rgba(201,168,76,0.2); }

    .card-info { flex: 1; position: relative; z-index: 1; }
    .card-platform { font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.15rem; font-weight: 600; }
    .card-username { font-family: 'Cinzel', serif; font-size: 1rem; font-weight: 700; color: var(--text); }
    .card-arrow { font-size: 0.9rem; color: var(--gold-dim); position: relative; z-index: 1; transition: color 0.3s, transform 0.3s; }
    .card:hover .card-arrow { color: var(--gold); transform: translateX(3px); }
    .card-static .card-arrow, .card-clickable .card-arrow { display: none; }

    .copy-tip { font-size: 0.65rem; color: var(--muted); letter-spacing: 0.1em; position: relative; z-index: 1; margin-top: 2px; }

    .footer { font-size: 0.6rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--muted); animation: fadeUp 1s 0.9s both; }

    @keyframes fadeDown { from{opacity:0;transform:translateY(-20px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  </style>
</head>

<script>
// ── Thunder & Lightning Engine ──
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
const flash = document.getElementById('flash');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Rain drops
const drops = [];
const DROP_COUNT = 180;
for (let i = 0; i < DROP_COUNT; i++) {
  drops.push({
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight,
    len: 8 + Math.random() * 20,
    speed: 6 + Math.random() * 10,
    opacity: 0.1 + Math.random() * 0.3,
    width: 0.5 + Math.random() * 1
  });
}

// Storm clouds (dark smears at top)
function drawClouds() {
  const grad = ctx.createLinearGradient(0, 0, 0, canvas.height * 0.45);
  grad.addColorStop(0, 'rgba(5,5,18,1)');
  grad.addColorStop(0.5, 'rgba(8,8,22,0.85)');
  grad.addColorStop(1, 'rgba(5,5,10,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height * 0.45);

  // Swirling cloud shapes
  for (let i = 0; i < 6; i++) {
    const cx = (canvas.width / 6) * i + canvas.width / 12;
    const cy = 40 + Math.sin(Date.now() * 0.0003 + i) * 15;
    const grad2 = ctx.createRadialGradient(cx, cy, 10, cx, cy, 120 + i * 20);
    grad2.addColorStop(0, 'rgba(15,15,35,0.6)');
    grad2.addColorStop(1, 'rgba(5,5,15,0)');
    ctx.fillStyle = grad2;
    ctx.beginPath();
    ctx.ellipse(cx, cy, 130 + i * 10, 60, 0, 0, Math.PI * 2);
    ctx.fill();
  }
}

// Lightning bolt generator
function makeBolt(x, y, targetX, targetY, generations) {
  const points = [{x, y}];
  let cx = x, cy = y;
  const steps = 12 + Math.floor(Math.random() * 8);
  for (let i = 0; i < steps; i++) {
    const progress = (i + 1) / steps;
    const tx = x + (targetX - x) * progress;
    const ty = y + (targetY - y) * progress;
    const offset = (1 - progress) * (80 - generations * 20);
    cx = tx + (Math.random() - 0.5) * offset * 2;
    cy = ty + (Math.random() - 0.5) * offset * 0.5;
    points.push({x: cx, y: cy});

    // Branch
    if (generations > 0 && Math.random() < 0.3) {
      const bx = cx + (Math.random() - 0.5) * 100;
      const by = cy + Math.random() * 80 + 30;
      bolts.push({
        points: makeBolt(cx, cy, bx, by, generations - 1),
        alpha: 0.4 + Math.random() * 0.3,
        life: 1, maxLife: 8 + Math.floor(Math.random() * 8),
        width: 0.5 + Math.random() * 0.8,
        color: Math.random() < 0.4 ? [220, 200, 255] : [180, 220, 255]
      });
    }
  }
  return points;
}

const bolts = [];

function spawnLightning() {
  const x = canvas.width * (0.1 + Math.random() * 0.8);
  const targetX = x + (Math.random() - 0.5) * 200;
  const targetY = canvas.height * (0.4 + Math.random() * 0.45);

  const color = Math.random() < 0.5 ? [220, 200, 255] : [255, 220, 130];

  bolts.push({
    points: makeBolt(x, 0, targetX, targetY, 2),
    alpha: 1,
    life: 1,
    maxLife: 10 + Math.floor(Math.random() * 10),
    width: 1.5 + Math.random() * 2,
    color
  });

  // Screen flash
  const [r, g, b] = color;
  flash.style.background = `rgba(${r},${g},${b},0.08)`;
  setTimeout(() => {
    flash.style.background = `rgba(${r},${g},${b},0.04)`;
    setTimeout(() => { flash.style.background = 'rgba(0,0,0,0)'; }, 60);
  }, 50);

  // Thunder sound schedule (visual rumble effect on cards)
  setTimeout(() => {
    document.querySelectorAll('.card').forEach(c => {
      c.style.transition = 'transform 0.05s, border-color 0.3s';
      c.style.transform = `translateX(${(Math.random()-0.5)*3}px)`;
      setTimeout(() => { c.style.transform = ''; c.style.transition = 'border-color 0.3s, transform 0.2s'; }, 80);
    });
  }, 300 + Math.random() * 800);
}

function drawBolt(bolt) {
  if (bolt.points.length < 2) return;
  const t = bolt.life / bolt.maxLife;
  const [r, g, b] = bolt.color;

  // Glow layer
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(bolt.points[0].x, bolt.points[0].y);
  for (let i = 1; i < bolt.points.length; i++) {
    ctx.lineTo(bolt.points[i].x, bolt.points[i].y);
  }
  ctx.strokeStyle = `rgba(${r},${g},${b},${bolt.alpha * t * 0.3})`;
  ctx.lineWidth = bolt.width * 8;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.shadowBlur = 30;
  ctx.shadowColor = `rgba(${r},${g},${b},0.6)`;
  ctx.stroke();

  // Core
  ctx.beginPath();
  ctx.moveTo(bolt.points[0].x, bolt.points[0].y);
  for (let i = 1; i < bolt.points.length; i++) {
    ctx.lineTo(bolt.points[i].x, bolt.points[i].y);
  }
  ctx.strokeStyle = `rgba(255,255,255,${bolt.alpha * t * 0.9})`;
  ctx.lineWidth = bolt.width * 0.8;
  ctx.shadowBlur = 10;
  ctx.shadowColor = `rgba(255,255,255,0.8)`;
  ctx.stroke();
  ctx.restore();
}

function drawRain() {
  ctx.save();
  drops.forEach(d => {
    d.y += d.speed;
    d.x -= d.speed * 0.15;
    if (d.y > canvas.height) { d.y = -d.len; d.x = Math.random() * canvas.width; }
    if (d.x < 0) d.x = canvas.width;

    ctx.beginPath();
    ctx.moveTo(d.x, d.y);
    ctx.lineTo(d.x - d.len * 0.15, d.y + d.len);
    ctx.strokeStyle = `rgba(150,180,255,${d.opacity})`;
    ctx.lineWidth = d.width;
    ctx.stroke();
  });
  ctx.restore();
}

// Ground glow / puddle shimmer
function drawGround() {
  const grad = ctx.createLinearGradient(0, canvas.height * 0.75, 0, canvas.height);
  grad.addColorStop(0, 'rgba(0,0,0,0)');
  grad.addColorStop(1, 'rgba(10,10,30,0.5)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, canvas.height * 0.75, canvas.width, canvas.height * 0.25);
}

// Lightning schedule
let nextBolt = 0;
function scheduleBolt() {
  nextBolt = Date.now() + 1500 + Math.random() * 4000;
}
scheduleBolt();

function loop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Dark stormy sky gradient
  const sky = ctx.createLinearGradient(0, 0, 0, canvas.height);
  sky.addColorStop(0, '#04040f');
  sky.addColorStop(0.6, '#07070e');
  sky.addColorStop(1, '#0a0a06');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  drawClouds();
  drawRain();
  drawGround();

  // Update & draw bolts
  for (let i = bolts.length - 1; i >= 0; i--) {
    bolts[i].life--;
    if (bolts[i].life <= 0) { bolts.splice(i, 1); continue; }
    drawBolt(bolts[i]);
  }

  if (Date.now() >= nextBolt) {
    spawnLightning();
    scheduleBolt();
  }

  requestAnimationFrame(loop);
}
loop();

// Discord copy
function copyDiscord() {
  navigator.clipboard.writeText('slorpzz1').then(() => {
    const tip = document.getElementById('discord-tip');
    tip.textContent = '✓ copied!';
    tip.style.color = '#c9a84c';
    setTimeout(() => { tip.textContent = 'click to copy username'; tip.style.color = ''; }, 2000);
  });
}
</script>
