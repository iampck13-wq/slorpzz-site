<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fixed</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    padding: 0;
    overflow-x: hidden; /* stops side scrolling */
    background: #0f0f0f;
    color: white;
    font-family: Arial, sans-serif;
}

.container {
    width: 100%;
    max-width: 600px;
    margin: 0 auto;
    padding: 20px;
    text-align: center;
    word-break: break-word;
}

h1, p {
    max-width: 100%;
}
</style>
</head>

<body>

<div class="container">
    <h1>Hello</h1>
    <p>This will NEVER go off-screen now.</p>
</div>

</body>
</html>
