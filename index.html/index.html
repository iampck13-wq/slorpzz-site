<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Site</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: white;

    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.container {
    width: 90%;
    max-width: 700px;
    padding: 20px;
    text-align: center;
    word-wrap: break-word;
    overflow-wrap: break-word;
}

h1 {
    font-size: 2rem;
}

p {
    font-size: 1rem;
}
</style>

</head>
<body>

<div class="container">
    <h1>Hello</h1>
    <p>Your text will now stay inside the screen and wrap properly.</p>
</div>

</body>
</html>
